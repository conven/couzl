name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      # -x test: 테스트 생략하고 빌드 속도 향상
      - name: Build WAR
        run: ./gradlew bootWar -x test

      # SCP 전송 시 파일명 고정
      - name: Rename WAR
        run: mv build/libs/*.war build/libs/couzl.war

      - name: Upload WAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/couzl.war"
          target: "/home/ubuntu/couzl"
          strip_components: 2

      - name: Restart application on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f "java" || true
            sleep 3
            nohup authbind --deep java -jar /home/ubuntu/couzl/couzl.war \
              --spring.profiles.active=prod \
              > /home/ubuntu/couzl/app.log 2>&1 &
            echo "Deployed PID: $!"
