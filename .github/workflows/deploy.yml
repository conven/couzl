  yamlname: Deploy to EC2

  on:
    push:
      branches: [ main ]

  jobs:
    deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Grant gradlew permission
          run: chmod +x ./gradlew

        - name: Build WAR
          run: ./gradlew bootWar -x test

        - name: Rename WAR
          run: mv build/libs/*.war build/libs/couzl.war

        - name: Upload WAR to EC2
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            source: "build/libs/couzl.war"
            target: "/home/ubuntu/couzl"
            strip_components: 2

        - name: Restart application on EC2
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USERNAME }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              sudo systemctl restart couzl
              sleep 3
              sudo systemctl status couzl --no-pager