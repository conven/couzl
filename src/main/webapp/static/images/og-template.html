<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #FFD60A; }
  .og-wrap { width: 1200px; height: 630px; background: #FFD60A; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .bg-deco { position: absolute; inset: 0; }
  .circle-deco { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .c1 { width: 400px; height: 400px; top: -120px; right: -80px; }
  .c2 { width: 250px; height: 250px; bottom: -60px; left: 60px; }
  .c3 { width: 120px; height: 120px; top: 80px; left: 180px; }
  .c4 { width: 60px; height: 60px; bottom: 120px; right: 260px; }
  .dot-line { position: absolute; height: 2px; background: repeating-linear-gradient(90deg, rgba(255,255,255,0.3) 0, rgba(255,255,255,0.3) 8px, transparent 8px, transparent 16px); }
  .dl1 { width: 300px; top: 140px; right: 80px; transform: rotate(-15deg); }
  .dl2 { width: 200px; bottom: 180px; left: 120px; transform: rotate(10deg); }
  .spark { position: absolute; opacity: 0.4; color: rgba(255,255,255,0.6); }
  .sp1 { top: 80px; left: 320px; font-size: 32px; }
  .sp2 { top: 200px; right: 180px; font-size: 18px; }
  .sp3 { bottom: 100px; left: 500px; font-size: 22px; }
  .sp4 { top: 320px; left: 100px; font-size: 16px; }
  .content { position: relative; z-index: 10; display: flex; align-items: center; gap: 80px; padding: 0 80px; }
  .logo-area { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .coupon-logo { width: 180px; height: 180px; background: white; border-radius: 28px; position: relative; display: flex; align-items: center; justify-content: center; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .coupon-logo::before, .coupon-logo::after { content: ''; position: absolute; width: 28px; height: 28px; background: #FFD60A; border-radius: 50%; top: 50%; transform: translateY(-50%); }
  .coupon-logo::before { left: -14px; }
  .coupon-logo::after { right: -14px; }
  .logo-inner { display: flex; flex-direction: column; align-items: center; }
  .logo-c { font-size: 72px; font-weight: 900; color: #FFD60A; line-height: 1; }
  .logo-divider { width: 80px; height: 1.5px; margin: 6px 0; background: repeating-linear-gradient(90deg, #FFD60A 0, #FFD60A 6px, transparent 6px, transparent 12px); }
  .logo-text-en { font-size: 20px; font-weight: 800; color: #1A1A1A; letter-spacing: 3px; }
  .text-area { flex: 1; }
  .badge { display: inline-flex; align-items: center; background: rgba(0,0,0,0.12); color: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
  .main-title { font-size: 62px; font-weight: 900; color: #1A1A1A; line-height: 1.1; margin-bottom: 16px; }
  .main-title .highlight { color: white; }
  .sub-title { font-size: 22px; font-weight: 500; color: rgba(0,0,0,0.55); margin-bottom: 36px; }
  .tags { display: flex; gap: 10px; }
  .tag { background: white; color: #333; padding: 8px 16px; border-radius: 100px; font-size: 14px; font-weight: 600; }
  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, rgba(0,0,0,0.15), rgba(0,0,0,0.05), rgba(0,0,0,0.15)); }
</style>
</head>
<body>
<div class="og-wrap">
  <div class="bg-deco">
    <div class="circle-deco c1"></div><div class="circle-deco c2"></div>
    <div class="circle-deco c3"></div><div class="circle-deco c4"></div>
    <div class="dot-line dl1"></div><div class="dot-line dl2"></div>
    <div class="spark sp1">✦</div><div class="spark sp2">✦</div>
    <div class="spark sp3">✦</div><div class="spark sp4">✦</div>
  </div>
  <div class="content">
    <div class="logo-area">
      <div class="coupon-logo">
        <div class="logo-inner">
          <span class="logo-c">C</span>
          <div class="logo-divider"></div>
          <span class="logo-text-en">COUZL</span>
        </div>
      </div>
    </div>
    <div class="text-area">
      <div class="badge">🎟️ LOCAL COUPON PLATFORM</div>
      <div class="main-title">즐거움을<br><span class="highlight">나누는</span> 쿠폰</div>
      <div class="sub-title">내 주변 소상공인 혜택을 한 곳에서</div>
      <div class="tags">
        <span class="tag">📍 로컬 가맹점</span>
        <span class="tag">🎫 쿠폰 할인</span>
        <span class="tag">💛 지역 상생</span>
      </div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</div>
</body>
</html>
